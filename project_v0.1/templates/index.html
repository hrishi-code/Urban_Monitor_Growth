<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Expansion & POI Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Force Dark Mode Styling */
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #000000; border-bottom: 2px solid #333; }
        .card { background-color: #1e1e1e; border: 1px solid #2d2d2d; border-radius: 12px; }
        .card-header { background-color: #252525; border-bottom: 1px solid #333; font-weight: bold; letter-spacing: 1px;}
        
        /* The Map needs a strict height so Leaflet doesn't glitch */
        #map { height: 100%; min-height: 550px; border-radius: 8px; }
        
        .metric-box { text-align: center; padding: 15px; }
        .metric-title { font-size: 0.8rem; color: #888; text-transform: uppercase; font-weight: bold; }
        .metric-value { font-size: 1.8rem; font-weight: bold; color: #fff; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-4">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h1">🍩 Urban Expansion & POI Analytics</span>
            <div class="d-flex">
                <input type="text" id="cityInput" class="form-control bg-dark text-light border-secondary me-2" placeholder="e.g. Pune" value="Pune">
                <button id="btnAnalyze" class="btn btn-outline-info" onclick="runPrediction()">Run Scan</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row g-4" id="resultsPanel">
            
            <div class="col-lg-6">
                <div class="card h-100 shadow-lg">
                    <div class="card-header text-info">
                        SPATIAL RADIANCE HEATMAP (BATRAK METHOD)
                    </div>
                    <div class="card-body p-1">
                        <div id="map"></div> </div>
                </div>
            </div>

            <div class="col-lg-6">
                
                <div class="text-center mb-4 mt-2">
                    <h1 class="display-4 fw-bold text-white text-uppercase" id="cityNameDisplay">AWAITING SCAN</h1>
                    <div id="aiStatusBadge" class="d-inline-block px-4 py-2 mt-2 fw-bold" style="border-radius: 30px; font-size: 1.2rem; background: #333;">
                        Ready for Input
                    </div>
                </div>
                
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <div class="card metric-box shadow">
                            <div class="metric-title">Avg Radiance</div>
                            <div class="metric-value" id="valRadiance">--</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card metric-box shadow">
                            <div class="metric-title">YoY Growth</div>
                            <div class="metric-value" id="valGrowth">--</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card metric-box shadow">
                            <div class="metric-title">Sprawl Patchiness</div>
                            <div class="metric-value text-info" id="valPatchiness">--</div>
                        </div>
                    </div>
                </div>

                <div class="card shadow">
                    <div class="card-header text-secondary">
                        MACRO-ECONOMIC TRAJECTORY (5-YEAR)
                    </div>
                    <div class="card-body">
                        <canvas id="growthChart" height="200"></canvas>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
