<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Growth AI Monitor</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🛰️ Urban Growth AI</span>
            <span class="badge bg-success">System Online</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="card bg-secondary text-white shadow">
                    <div class="card-body">
                        <h5><i class="fas fa-search-location"></i> Select Target</h5>
                        <select id="citySelect" class="form-select mt-3 bg-dark text-white border-0">
                            <option value="Pune">Pune</option>
                            <option value="Mumbai">Mumbai</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Bangalore">Bangalore</option>
                        </select>
                        <button onclick="runPrediction()" class="btn btn-success w-100 mt-3">
                            <i class="fas fa-satellite-dish"></i> Analyze & Predict
                        </button>
                    </div>
                </div>

                <div id="resultsPanel" class="mt-3 d-none">
                    <div class="card bg-dark text-white border-success">
                        <div class="card-header border-success">AI Analysis Result</div>
                        <div class="card-body">
                            <h2 id="aiStatus" class="text-center text-success fw-bold">--</h2>
                            <p class="text-center text-muted mb-4" id="aiConf">Confidence: --%</p>
                            
                            <div class="row text-center">
                                <div class="col-6">
                                    <small>Radiance</small>
                                    <h5 id="valRadiance">--</h5>
                                </div>
                                <div class="col-6">
                                    <small>Growth</small>
                                    <h5 id="valGrowth">--</h5>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="card shadow">
                    <div class="card-body p-0">
                        <div id="map" style="height: 550px; width: 100%;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
